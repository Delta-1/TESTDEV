<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>MonografiaAI - Pro Mobile</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        slate: { 850: '#151e2e', 900: '#0f172a' },
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    } 
                } 
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Estilos do Documento APA 7 / UPDS -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        .hidden-state { display: none !important; }

        /* Scrollbar Suave */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Container do Papel (Permite pan/zoom no mobile) */
        .a4-container {
            background-color: #e2e8f0;
            padding: 1rem;
            overflow: auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            -webkit-overflow-scrolling: touch;
        }
        .dark .a4-container { background-color: #0f172a; }

        @media (min-width: 1024px) {
            .a4-container { padding: 2rem; }
        }

        /* Página A4 Branca Constante */
        .a4-page {
            background: white !important;
            width: 210mm;
            max-width: none; /* Força o tamanho real para manter o layout APA */
            min-height: 297mm;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            padding: 2.54cm 2.54cm 2.54cm 3cm;
            font-family: 'Tinos', 'Times New Roman', Times, serif;
            font-size: 12pt;
            line-height: 2; /* Espaçamento Duplo APA */
            color: black !important;
            position: relative;
            flex-shrink: 0;
            box-sizing: border-box;
            page-break-after: always;
        }

        /* Regras de Texto Baseadas na APA 7ª Edição */
        .a4-page p { text-indent: 1.27cm; margin-bottom: 0; text-align: justify; }
        .a4-page h1 { font-size: 12pt; font-weight: bold; text-align: center; margin-top: 24pt; margin-bottom: 12pt; text-indent: 0; }
        .a4-page h2 { font-size: 12pt; font-weight: bold; text-align: left; margin-top: 24pt; margin-bottom: 12pt; text-indent: 0; }
        .a4-page h3 { font-size: 12pt; font-weight: bold; font-style: italic; text-align: left; margin-top: 24pt; margin-bottom: 12pt; text-indent: 0; }
        .a4-page .hanging-indent { padding-left: 1.27cm; text-indent: -1.27cm; margin-bottom: 12pt; text-align: left; }

        /* Listas no Índice */
        .toc-list { list-style: none; padding: 0; margin-top: 24pt; }
        .toc-item { display: flex; align-items: flex-end; margin-bottom: 12pt; line-height: 1.2; text-indent: 0; }
        .toc-title { font-weight: normal; background: white; padding-right: 8px; }
        .toc-dots { border-bottom: 2px dotted #000; flex-grow: 1; margin: 0 4px; position: relative; top: -4px; }
        .toc-page { background: white; padding-left: 8px; }

        /* Capa UPDS */
        .cover-page {
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: 100%; min-height: calc(297mm - 5.08cm); text-align: center;
        }
        .cover-page p { text-indent: 0; text-align: center; }
        .center-text { text-align: center; }
        .bold-text { font-weight: bold; }
        .italic-text { font-style: italic; }
        .uppercase-text { text-transform: uppercase; }

        /* Transições Suaves */
        .tab-transition { transition: all 0.3s ease-in-out; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; background: none; padding: 0; display: block;}
            .a4-container { background: none; padding: 0; gap: 0; display: block; overflow: visible;}
            .a4-page { box-shadow: none; margin: 0; border: none; }
            @page { size: A4; margin: 0; }
            .hide-on-print { display: none !important; }
        }
    </style>
</head>
