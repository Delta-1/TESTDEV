        // --- STREAMING_CHUNK: Sistema de Notificação Toast (Alternativa ao alert) ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-2.5 p-4 rounded-xl shadow-2xl text-white transition-all duration-300 border transform translate-y-2 opacity-0 pointer-events-auto ${
                type === 'error' ? 'bg-red-600 border-red-500' : 'bg-indigo-600 border-indigo-500'
            }`;
            
            const iconName = type === 'error' ? 'shield-alert' : 'check-circle-2';
            toast.innerHTML = `
                ${getIcon(iconName, "w-5 h-5 shrink-0")}
                <span class="font-medium text-sm">${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // --- STREAMING_CHUNK: Calculando alíquotas fiscais com base no regime ---
        function getTaxRates(regime) {
            switch (regime) {
                case 'Simples Nacional':
                    return { pis: 0.0, cofins: 0.0, irpjcsll: 0.0, icms: 0.08, total: 0.08, label: 'Simples Nacional Comércio (8%)' };
                case 'Lucro Presumido':
                    return { pis: 0.0065, cofins: 0.03, irpjcsll: 0.0228, icms: 0.17, total: 0.2293, label: 'Presumido (PIS/COF/IR/CS/ICMS - 22.93%)' };
                case 'Lucro Real':
                    return { pis: 0.0165, cofins: 0.076, irpjcsll: 0.0869, icms: 0.17, total: 0.3494, label: 'Lucro Real Não-Cumulativo (34.94%)' };
                default:
                    return { pis: 0.0, cofins: 0.0, irpjcsll: 0.0, icms: 0.17, total: 0.17, label: 'Sem Regime (ICMS 17%)' };
            }
        }

        function calculatePrice(unitCost, desiredMarginPercent) {
            const taxes = getTaxRates(state.currentUser ? state.currentUser.regime : 'Simples Nacional');
            const marginFrac = desiredMarginPercent / 100;
            const taxFrac = taxes.total;

            const factor = 1 - taxFrac - marginFrac;
            if (factor <= 0.05) {
                return {
                    suggestedPrice: unitCost * (1 + marginFrac) * (1 + taxFrac),
                    markup: (1 + marginFrac) * (1 + taxFrac),
                    isEmergency: true
                };
            }
            const price = unitCost / factor;
            return {
                suggestedPrice: price,
                markup: price / unitCost,
                isEmergency: false
            };
        }

        // --- STREAMING_CHUNK: Gerenciando controle de logins de usuários ---
        function handleLogin(event) {
            event.preventDefault();
            const loginInput = document.getElementById('login-username').value;
            const passwordInput = document.getElementById('login-password').value;

            const matchedUser = state.users.find(u => u.login === loginInput && u.senha === passwordInput);

            if (matchedUser) {
                if (matchedUser.status === 'X') {
                    document.getElementById('login-error-msg').innerText = 'Acesso bloqueado! Entre em contato com o suporte ou ADM para regularizar.';
                    document.getElementById('login-error-box').classList.remove('hidden');
                    showToast('Acesso negado para este usuário.', 'error');
                    return;
                }
                state.currentUser = matchedUser;
                showToast(`Bem-vindo, ${matchedUser.nome}!`);
                renderMainLayout();
            } else {
                document.getElementById('login-error-msg').innerText = 'Usuário ou senha incorretos.';
                document.getElementById('login-error-box').classList.remove('hidden');
                showToast('Falha no login.', 'error');
            }
        }

        function handleLogout() {
            state.currentUser = null;
            state.activeTab = 'pricing';
            showToast('Sessão encerrada com sucesso.');
            renderLoginView();
        }

        // --- STREAMING_CHUNK: Leitor Real e Parser de Nota Fiscal Eletrônica XML ---
        function handleXmlUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const xmlText = e.target.result;
                parseXmlNFe(xmlText, file.name);
            };
            reader.readAsText(file);
        }

        function parseXmlNFe(xmlText, fileName) {
            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                
                const detElements = xmlDoc.getElementsByTagName('det');
                const emitElement = xmlDoc.getElementsByTagName('emit')[0];
                const emitNome = emitElement ? emitElement.getElementsByTagName('xNome')[0]?.textContent : 'Fornecedor XML';

                if (detElements.length === 0) {
                    throw new Error('Nenhum elemento det encontrado');
                }

                let totalCostSum = 0;
                const parsedProducts = [];

                for (let i = 0; i < detElements.length; i++) {
                    const prodElement = detElements[i].getElementsByTagName('prod')[0];
                    if (prodElement) {
                        const name = prodElement.getElementsByTagName('xProd')[0]?.textContent || `Insumo XML ${i + 1}`;
                        const ncm = prodElement.getElementsByTagName('NCM')[0]?.textContent || '00000000';
                        const qty = Number(prodElement.getElementsByTagName('qCom')[0]?.textContent || 1);
                        const unitCost = Number(prodElement.getElementsByTagName('vUnCom')[0]?.textContent || 0);

                        totalCostSum += (unitCost * qty);

                        parsedProducts.push({
                            id: `xml_${Date.now()}_${i}`,
                            name,
                            ncm,
                            qty,
                            unitCost,
                            margin: 30,
                            isProcessed: false
                        });
                    }
                }

                state.products = [...parsedProducts, ...state.products];

                const historyItem = {
                    id: `h_upload_${Date.now()}`,
                    fileName,
                    date: new Date().toLocaleDateString('pt-BR'),
                    itemsCount: parsedProducts.length,
                    totalCost: totalCostSum,
                    supplier: emitNome
                };
                state.history.unshift(historyItem);
                
                saveToStorage();
                showToast(`XML Processado! ${parsedProducts.length} itens importados.`);
                renderPricingTab();
            } catch(e) {
                showToast('Erro ao ler arquivo XML de Nota Fiscal.', 'error');
            }
        }

                    </form>

                    <!-- TABELA DE CONTROLE DOS LOGINS SINCRONIZADOS -->
                    <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl lg:col-span-2 space-y-4">

        function renderUsersRows() {
            const tableBody = document.getElementById('users-table-body');
            tableBody.innerHTML = state.users.map(u => `
                <tr class="hover:bg-slate-800/30">
                    <td class="py-2.5 px-3 font-semibold text-white">${u.nome}</td>
                    <td class="py-2.5 px-3 font-mono text-emerald-400">${u.login}</td>
                    <td class="py-2.5 px-3 font-mono text-slate-400">••••••••</td>
                    <td class="py-2.5 px-3">
                        <span class="px-2 py-0.5 bg-slate-950 border border-slate-800 text-slate-300 rounded font-semibold text-[10px]">
                            ${u.regime}
                        </span>
                    </td>
                    <td class="py-2.5 px-3 text-center">
                        <button onclick="toggleUserStatus('${u.id}')" class="px-3 py-1 text-[10px] font-bold rounded-full transition-all ${
                            u.status === 'OK' 
                                ? 'bg-emerald-500/10 border border-emerald-500/20 text-emerald-400' 
                                : 'bg-red-500/10 border border-red-500/20 text-red-400'
                        }">
                            ${u.status === 'OK' ? 'OK (Ativo)' : 'X (Bloqueado)'}
                        </button>
                    </td>
                    <td class="py-2.5 px-3 text-center">
                        <button onclick="deleteUser('${u.id}', '${u.login}')" class="p-1.5 text-slate-500 hover:text-red-400 hover:bg-red-500/10 rounded-lg">
                            ${getIcon('trash-2', 'w-3.5 h-3.5')}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function handleCreateUser(e) {
            e.preventDefault();
            const nome = document.getElementById('new-user-nome').value;
            const login = document.getElementById('new-user-login').value;
            const senha = document.getElementById('new-user-senha').value;
            const regime = document.getElementById('new-user-regime').value;
            const status = document.getElementById('new-user-status').value;

            if (!login || !senha || !nome) {
                showToast('Preencha todos os campos.', 'error');
                return;
            }

            const exists = state.users.some(u => u.login === login);
            if (exists) {
                showToast('Este login já existe na planilha!', 'error');
                return;
            }

            const newUser = {
                id: 'u_' + Date.now(),
                nome,
                login,
                senha,
                regime,
                status
            };

            state.users.push(newUser);
            saveToStorage();
            showToast('Novo usuário cadastrado!');
            renderAdminTab();
        }

        function toggleUserStatus(id) {
            state.users = state.users.map(u => {
                if (u.id == id || u.id === id) {
                    if (u.login === state.currentUser.login && u.status === 'OK') {
                        showToast('Você não pode desativar seu próprio usuário logado!', 'error');
                        return u;
                    }
                    const newStatus = u.status === 'OK' ? 'X' : 'OK';
                    showToast(`Status alterado para ${newStatus === 'OK' ? 'Ativo' : 'Bloqueado'}`);
                    return { ...u, status: newStatus };
                }
                return u;
            });
            saveToStorage();
            renderAdminTab();
        }

        function deleteUser(id, login) {
            if (login === '123') {
                showToast('O administrador padrão demo não pode ser excluído.', 'error');
                return;
            }
            state.users = state.users.filter(u => u.id != id);
            saveToStorage();
            showToast('Usuário removido da planilha.');
            renderAdminTab();
        }

        // --- STREAMING_CHUNK: Acionando inicializador global onload do navegador ---
        window.onload = function() {
            renderLoginView();
        }
    </script>
