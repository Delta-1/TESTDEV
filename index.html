<!DOCTYPE html>

<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col antialiased">

    <div id="app-viewport" class="flex-grow flex flex-col"></div>

        function getIcon(name, customClass = "w-5 h-5") {
            const raw = SVG_ICONS[name] || '';
            return raw.replace("##CLASS##", customClass);
        }

        const INITIAL_USERS = [
            { id: 1, login: "123", senha: "123", regime: "MEI", status: "OK", nome: "Micro Empresa Demo" },
            { id: 2, login: "joao_simples", senha: "123", regime: "Simples Nacional", status: "OK", nome: "Mercado João Ltda" },
            { id: 3, login: "maria_real", senha: "123", regime: "Lucro Real", status: "OK", nome: "Supermercado Maria" },
            { id: 4, login: "coop_test", senha: "123", regime: "Cooperativa", status: "OK", nome: "Cooperativa Produtos" },
            { id: 5, login: "presumido", senha: "123", regime: "Lucro Presumido", status: "OK", nome: "Empresa Presumida" },
        ];

        const INITIAL_PRODUCTS = [
            { id: 'p1', name: 'Milho em Grão Seco 50kg', ncm: '10059010', qty: 10, unitCost: 159.61, margin: 25, isProcessed: false },
            { id: 'p2', name: 'Sabão em Barra de Coco Multi', ncm: '34011900', qty: 50, unitCost: 3.50, margin: 30, isProcessed: true },
            { id: 'p3', name: 'Arroz Integral Tipo 1 Saco 5kg', ncm: '10062000', qty: 20, unitCost: 18.90, margin: 20, isProcessed: false }
        ];

        const INITIAL_HISTORY = [
            { id: 'h1', fileName: 'NFe_35260610_comercio_milho.xml', date: '10/06/2026', itemsCount: 3, totalCost: 1775.00, supplier: 'Cerealista Rondônia S/A' },
            { id: 'h2', fileName: 'NFe_35260608_sabao_coco.xml', date: '08/06/2026', itemsCount: 1, totalCost: 175.00, supplier: 'Química Industrial Norte' }
        ];

        let state = {
            currentUser: null,
            activeTab: 'pricing', 
            users: JSON.parse(localStorage.getItem('saas_html_users')) || INITIAL_USERS,
            products: JSON.parse(localStorage.getItem('saas_html_products')) || INITIAL_PRODUCTS,
            history: JSON.parse(localStorage.getItem('saas_html_history')) || INITIAL_HISTORY,
            searchQuery: ''
        };

        function saveToStorage() {
            localStorage.setItem('saas_html_users', JSON.stringify(state.users));
            localStorage.setItem('saas_html_products', JSON.stringify(state.products));
            localStorage.setItem('saas_html_history', JSON.stringify(state.history));
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-2.5 p-4 rounded-xl shadow-2xl text-white transition-all duration-300 border transform translate-y-2 opacity-0 pointer-events-auto ${
                type === 'error' ? 'bg-red-600 border-red-500' : 'bg-indigo-600 border-indigo-500'
            }`;
            
            const iconName = type === 'error' ? 'shield-alert' : 'check-circle-2';
            toast.innerHTML = `${getIcon(iconName, "w-5 h-5 shrink-0")}<span class="font-medium text-sm">${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.remove('translate-y-2', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function getTaxRates(regime) {
            switch (regime) {
                case 'MEI':
                    return { 
                        pis: 0.0, cofins: 0.0, irpjcsll: 0.0, icms: 0.0, 
                        total: 0.0, 
                        label: 'MEI (Isento de Impostos)',
                        obs: 'Isento de PIS/COFINS/IR. Apenas ICMS por Estado.'
                    };
                case 'Simples Nacional':
                    return { 
                        pis: 0.0, cofins: 0.0, irpjcsll: 0.0, icms: 0.08, 
                        total: 0.08, 
                        label: 'Simples Nacional Comércio (8%)',
                        obs: 'Alíquota fixa para comércio'
                    };
                case 'Cooperativa':
                    return { 
                        pis: 0.0065, cofins: 0.03, irpjcsll: 0.015, icms: 0.08, 
                        total: 0.1315, 
                        label: 'Cooperativa (13.15%)',
                        obs: 'Regime especial para cooperativas'
                    };
                case 'Lucro Presumido':
                    return { 
                        pis: 0.0065, cofins: 0.03, irpjcsll: 0.0228, icms: 0.17, 
                        total: 0.2293, 
                        label: 'Lucro Presumido (22.93%)',
                        obs: 'PIS/COFINS/IR/CSLL/ICMS'
                    };
                case 'Lucro Real':
                    return { 
                        pis: 0.0165, cofins: 0.076, irpjcsll: 0.0869, icms: 0.17, 
                        total: 0.3494, 
                        label: 'Lucro Real (34.94%)',
                        obs: 'Não-cumulativo com todos os impostos'
                    };
                default:
                    return { 
                        pis: 0.0, cofins: 0.0, irpjcsll: 0.0, icms: 0.17, 
                        total: 0.17, 
                        label: 'Sem Regime (17%)',
                        obs: 'Apenas ICMS'
                    };
            }
        }

        function calculatePrice(unitCost, desiredMarginPercent) {
            const taxes = getTaxRates(state.currentUser ? state.currentUser.regime : 'Simples Nacional');
            const marginFrac = desiredMarginPercent / 100;
            const taxFrac = taxes.total;
            const factor = 1 - taxFrac - marginFrac;
            if (factor <= 0.05) {
                return { suggestedPrice: unitCost * (1 + marginFrac) * (1 + taxFrac), markup: (1 + marginFrac) * (1 + taxFrac), isEmergency: true };
            }
            const price = unitCost / factor;
            return { suggestedPrice: price, markup: price / unitCost, isEmergency: false };
        }

        function handleLogin(event) {
            event.preventDefault();
            const loginInput = document.getElementById('login-username').value;
            const passwordInput = document.getElementById('login-password').value;
            const matchedUser = state.users.find(u => u.login === loginInput && u.senha === passwordInput);

            if (matchedUser) {
                if (matchedUser.status === 'X') {
                    document.getElementById('login-error-msg').innerText = 'Acesso bloqueado! Entre em contato com o suporte.';
                    document.getElementById('login-error-box').classList.remove('hidden');
                    showToast('Acesso negado para este usuário.', 'error');
                    return;
                }
                state.currentUser = matchedUser;
                showToast(`Bem-vindo, ${matchedUser.nome}!`);
                renderMainLayout();
            } else {
                document.getElementById('login-error-msg').innerText = 'Usuário ou senha incorretos.';
                document.getElementById('login-error-box').classList.remove('hidden');
                showToast('Falha no login.', 'error');
            }
        }

        function handleLogout() {
            state.currentUser = null;
            state.activeTab = 'pricing';
            showToast('Sessão encerrada com sucesso.');
            renderLoginView();
        }

        function renderLoginView() {
            const viewport = document.getElementById('app-viewport');
            viewport.className = "min-h-screen bg-slate-900 flex items-center justify-center p-4";
            viewport.innerHTML = `

                    </div>

                    <form onsubmit="handleLogin(event)" class="p-8 space-y-6">
                        <div id="login-error-box" class="hidden flex items-start gap-2.5 p-3.5 bg-red-900/40 border border-red-500/30 text-red-300 rounded-xl text-xs">
                            <span class="mt-0.5">${getIcon('shield-alert', 'w-4.5 h-4.5 text-red-400')}</span>
                            <span id="login-error-msg"></span>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold uppercase text-slate-300 mb-2">Usuário</label>
                            <input id="login-username" type="text" required placeholder="Ex: 123" class="w-full px-4 py-3 bg-slate-900/60 border border-slate-700 rounded-xl text-white focus:outline-none">
                        </div>

                        <div>
                            <label class="block text-xs font-semibold uppercase text-slate-300 mb-2">Senha</label>
                            <input id="login-password" type="password" required placeholder="Ex: 123" class="w-full px-4 py-3 bg-slate-900/60 border border-slate-700 rounded-xl text-white focus:outline-none">
                        </div>

                        <button type="submit" class="w-full py-3.5 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl shadow-lg flex items-center justify-center gap-2">
                            Acessar ${getIcon('chevron-right', 'w-4.5 h-4.5')}
                        </button>
                    </form>

                    <div class="p-6 bg-slate-900/60 border-t border-slate-700 text-xs text-slate-400 space-y-2">
                        <p class="font-semibold text-slate-300 flex items-center gap-1.5">
                            ${getIcon('help-circle', 'w-3.5 h-3.5 text-indigo-400')} Acessos:
                        </p>
                        <ul class="space-y-1 list-disc list-inside text-[11px]">
                            <li><strong>MEI:</strong> 123 / 123</li>
                            <li><strong>Simples:</strong> joao_simples / 123</li>
                            <li><strong>Cooperativa:</strong> coop_test / 123</li>
                            <li><strong>Real:</strong> maria_real / 123</li>
                        </ul>

                </div>
            `;
        }

            viewport.className = "min-h-screen bg-slate-950 text-slate-100 flex flex-col";
            const taxDetails = getTaxRates(state.currentUser.regime);

            viewport.innerHTML = `

                            <div class="text-right">
                                <span class="block text-xs font-bold text-white">${state.currentUser.nome}</span>

                <footer class="bg-slate-900 border-t border-slate-800 py-4 px-6 text-center text-xs text-slate-500">
                    <span>© 2026 CalcPrecificar 2.0 | Regime: <strong class="text-emerald-400">${state.currentUser.regime}</strong></span>
                </footer>
            `;
            switchTab(state.activeTab);
        }

        function switchTab(tabId) {
            state.activeTab = tabId;
            ['pricing', 'history', 'admin'].forEach(t => {
                const btn = document.getElementById(`tab-${t}-btn`);
                const content = document.getElementById(`tab-${t}-content`);
                if (btn) {
                    if (t === tabId || (t === 'admin' && tabId === 'admin_config')) {
                        btn.className = "px-4 py-2 rounded-lg text-sm font-semibold bg-indigo-600 text-white flex items-center gap-1.5";
                        if (content) content.classList.remove('hidden');
                    } else {
                        btn.className = "px-4 py-2 rounded-lg text-sm font-semibold text-slate-400 hover:bg-slate-800 flex items-center gap-1.5";
                        if (content) content.classList.add('hidden');
                    }
                }
            });
            if (tabId === 'pricing') renderPricingTab();
            if (tabId === 'history') renderHistoryTab();
            if (tabId === 'admin_config') renderAdminTab();
        }

        function renderPricingTab() {
            const container = document.getElementById('tab-pricing-content');
            const totalItems = state.products.length;
            const processedCount = state.products.filter(p => p.isProcessed).length;
            const totalCost = state.products.reduce((acc, p) => acc + (p.unitCost * p.qty), 0);

            container.innerHTML = `
                <div class="grid grid-cols-4 gap-4">
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl"><span class="text-xs text-slate-400">Total</span><span class="text-2xl font-bold">${totalItems}</span></div>
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl"><span class="text-xs text-slate-400">Pendentes</span><span class="text-2xl font-bold text-amber-400">${totalItems - processedCount}</span></div>
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl"><span class="text-xs text-slate-400">Salvos</span><span class="text-2xl font-bold text-sky-400">${processedCount}</span></div>
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl"><span class="text-xs text-slate-400">Custo Total</span><span class="text-xl font-bold text-emerald-400">R$ ${totalCost.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span></div>
                </div>

                <form onsubmit="handleAddManualProduct(event)" class="bg-slate-900 border border-slate-800 p-5 rounded-2xl space-y-4">
                    <h3 class="text-base font-bold">Adicionar Produto</h3>
                    <div class="grid grid-cols-5 gap-3">
                        <input id="manual-name" type="text" required placeholder="Nome" class="px-3 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white">
                        <input id="manual-ncm" type="text" placeholder="NCM" class="px-3 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white">
                        <input id="manual-qty" type="number" value="1" required class="px-3 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white">
                        <input id="manual-cost" type="number" step="0.01" required placeholder="Custo" class="px-3 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white">
                        <button type="submit" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-white font-semibold">Adicionar</button>
                    </div>
                </form>

                <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-slate-950 border-b border-slate-800">
                                <tr class="text-left text-[10px] font-bold text-slate-400 uppercase">
                                    <th class="py-3 px-4">Produto</th><th class="py-3 px-4">NCM</th><th class="py-3 px-4">Qtd</th>
                                    <th class="py-3 px-4">Custo</th><th class="py-3 px-4">Margem</th><th class="py-3 px-4">Preço Sugerido</th><th class="py-3 px-4">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="product-table-body"></tbody>
                        </table>
                    </div>
                </div>
            `;
            renderProductRows();
        }

        function renderProductRows() {
            const tableBody = document.getElementById('product-table-body');
            const taxDetails = getTaxRates(state.currentUser.regime);
            const filtered = state.products.filter(p => p.name.toLowerCase().includes(state.searchQuery.toLowerCase()) || p.ncm.includes(state.searchQuery));

            tableBody.innerHTML = filtered.map(p => {
                const res = calculatePrice(p.unitCost, p.margin);
                return `
                    <tr class="border-b border-slate-800 hover:bg-slate-800/30 text-sm">
                        <td class="py-3 px-4"><span class="font-semibold">${p.name}</span></td>
                        <td class="py-3 px-4 font-mono">${p.ncm}</td>
                        <td class="py-3 px-4">${p.qty}</td>
                        <td class="py-3 px-4">R$ ${p.unitCost.toFixed(2)}</td>
                        <td class="py-3 px-4"><input type="range" min="5" max="80" value="${p.margin}" oninput="updateMargin('${p.id}', this.value)" class="w-20 accent-indigo-500"> <span class="text-xs">${p.margin}%</span></td>
                        <td class="py-3 px-4 font-bold text-emerald-400">R$ ${res.suggestedPrice.toFixed(2)}</td>
                        <td class="py-3 px-4"><button onclick="deleteProduct('${p.id}')" class="text-red-400 hover:text-red-300">${getIcon('trash-2', 'w-4 h-4')}</button></td>
                    </tr>
                `;
            }).join('') || '<tr><td colspan="7" class="text-center py-4 text-slate-500">Nenhum produto</td></tr>';
        }

        function updateMargin(id, val) {
            state.products = state.products.map(p => p.id === id ? {...p, margin: Number(val)} : p);
            saveToStorage();
            renderProductRows();
        }

        function deleteProduct(id) {
            state.products = state.products.filter(p => p.id !== id);
            saveToStorage();
            showToast('Produto excluído.');
            renderPricingTab();
        }

        function handleAddManualProduct(e) {
            e.preventDefault();
            const name = document.getElementById('manual-name').value;
            const ncm = document.getElementById('manual-ncm').value || '00000000';
            const qty = Number(document.getElementById('manual-qty').value);
            const cost = Number(document.getElementById('manual-cost').value);

            if (!name || cost <= 0) {
                showToast('Preencha os campos.', 'error');
                return;
            }

            state.products.unshift({
                id: 'p_' + Date.now(),
                name, ncm, qty,
                unitCost: cost,
                margin: 30,
                isProcessed: false
            });
            saveToStorage();
            showToast('Produto adicionado!');
            e.target.reset();
            renderPricingTab();
        }

        function renderHistoryTab() {
            const container = document.getElementById('tab-history-content');
            container.innerHTML = `<div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">
                <h3 class="text-base font-bold mb-4">Histórico de Uploads</h3>
                <div id="history-grid" class="grid grid-cols-3 gap-4"></div>
            </div>`;
            
            const grid = document.getElementById('history-grid');
            grid.innerHTML = state.history.length === 0 ? '<p class="col-span-3 text-center text-slate-500">Nenhum histórico</p>' :
                state.history.map(h => `
                    <div class="p-4 bg-slate-950 border border-slate-800 rounded-xl">
                        <div class="text-xs text-slate-500 mb-2">${h.date}</div>
                        <h4 class="text-sm font-semibold mb-2">${h.fileName}</h4>
                        <p class="text-xs text-indigo-300 mb-3">Fornecedor: ${h.supplier}</p>
                        <div class="text-xs text-slate-400">Itens: <strong>${h.itemsCount}</strong> | Valor: <strong class="text-emerald-400">R$ ${h.totalCost.toFixed(2)}</strong></div>
                    </div>
                `).join('');
        }

        function renderAdminTab() {
            const container = document.getElementById('tab-admin-content');
            container.innerHTML = `
                <form onsubmit="handleCreateUser(event)" class="bg-slate-900 border border-slate-800 p-5 rounded-2xl space-y-4">
                    <h3 class="text-base font-bold">Novo Usuário</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <input id="new-user-nome" type="text" required placeholder="Empresa" class="px-3 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white">
                        <input id="new-user-login" type="text" required placeholder="Login" class="px-3 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white">
                        <input id="new-user-senha" type="password" required placeholder="Senha" class="px-3 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white">
                        <select id="new-user-regime" class="px-2.5 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white">
                            <option>MEI</option>
                            <option>Simples Nacional</option>
                            <option>Cooperativa</option>
                            <option>Lucro Presumido</option>
                            <option>Lucro Real</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg font-semibold">Cadastrar</button>
                </form>

                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">
                    <h3 class="text-base font-bold mb-4">Usuários Cadastrados</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-slate-950 border-b border-slate-800"><tr class="text-left text-xs font-bold text-slate-400"><th class="py-2 px-3">Empresa</th><th class="py-2 px-3">Login</th><th class="py-2 px-3">Regime</th><th class="py-2 px-3">Status</th></tr></thead>
                            <tbody id="users-table-body"></tbody>
                        </table>
                    </div>
                </div>
            `;
            renderUsersRows();
        }

        function renderUsersRows() {
            const tableBody = document.getElementById('users-table-body');
            tableBody.innerHTML = state.users.map(u => `
                <tr class="border-b border-slate-800">
                    <td class="py-2 px-3 font-semibold">${u.nome}</td>
                    <td class="py-2 px-3 font-mono text-indigo-300">${u.login}</td>
                    <td class="py-2 px-3 text-xs font-bold text-emerald-400">${u.regime}</td>
                    <td class="py-2 px-3"><span class="px-2 py-1 rounded text-xs font-bold ${u.status === 'OK' ? 'bg-emerald-500/20 text-emerald-300' : 'bg-red-500/20 text-red-300'}">${u.status}</span></td>
                </tr>
            `).join('');
        }

        function handleCreateUser(e) {
            e.preventDefault();
            const nome = document.getElementById('new-user-nome').value;
            const login = document.getElementById('new-user-login').value;
            const senha = document.getElementById('new-user-senha').value;
            const regime = document.getElementById('new-user-regime').value;

            state.users.push({
                id: state.users.length + 1,
                login, senha, regime,
                status: 'OK',
                nome
            });
            saveToStorage();
            showToast('Usuário cadastrado!');
            e.target.reset();
            renderUsersRows();
        }

        // Inicializa a app
        document.addEventListener('DOMContentLoaded', () => {
            renderLoginView();
        });
    </script>
</body>
</html>
